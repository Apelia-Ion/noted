<div class="drawing">

  <!-- ── Toolbar ────────────────────────────────────────────────────────── -->
  <div class="drawing__toolbar">
    <!-- Color swatches -->
    <div class="drawing__colors">
      @for (c of colors; track c) {
        <button class="swatch" [style.background]="c"
                [class.swatch--active]="color === c && !isEraser"
                (click)="setColor(c)" [title]="c"></button>
      }
    </div>

    <!-- Brush sizes -->
    <div class="drawing__sizes">
      @for (s of [2, 5, 10]; track s) {
        <button class="size-btn" [class.size-btn--active]="brushSize === s && !isEraser"
                (click)="setBrush(s)">
          <span class="size-dot" [style.width.px]="s + 4" [style.height.px]="s + 4"></span>
        </button>
      }
    </div>

    <!-- Eraser -->
    <button class="tool-btn" [class.tool-btn--active]="isEraser" (click)="toggleEraser()" title="Eraser">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 20H7L3 16l13-13 7 7-3 10z"/><path d="M6.5 17.5l5-5"/>
      </svg>
    </button>

    <!-- Clear -->
    <button class="tool-btn" (click)="clear()" title="Clear canvas">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
    </button>

    <!-- Save drawing -->
    <button class="tool-btn tool-btn--save" (click)="saveDrawing()" title="Save this drawing">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
      </svg>
      Save drawing
    </button>
  </div>

  <!-- ── Canvas ─────────────────────────────────────────────────────────── -->
  <canvas
    #drawCanvas
    class="drawing__canvas"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointerleave)="onPointerUp()"
  ></canvas>

  <!-- ── Saved drawings ─────────────────────────────────────────────────── -->
  @if (attachments.length > 0) {
    <div class="drawing__section-label">Saved drawings</div>
    <div class="photo-grid">
      @for (att of attachments; track att.id) {
        <div class="photo-tile">
          <img [src]="getUrl(att.id)" [alt]="att.name" class="photo-tile__img" />
          <div class="photo-tile__overlay">
            <button class="photo-tile__action" (click)="download(att)" title="Download">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="photo-tile__action photo-tile__action--danger" (click)="remove(att.id)" title="Remove">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
