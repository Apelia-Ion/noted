<div class="attach">
  <div class="attach__controls">
    <!-- Upload -->
    <label class="attach__btn attach__btn--upload">
      <input type="file" accept="audio/*" multiple (change)="onFileChange($event)" hidden />
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload audio
    </label>

    <!-- Record -->
    <button class="attach__btn" [class.attach__btn--recording]="recording" (click)="toggleRecord()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      @if (recording) { Stop · {{ formatTime(recordTime) }} } @else { Record }
    </button>
  </div>

  <!-- Attachment list -->
  @if (attachments.length > 0) {
    <ul class="attach__list">
      @for (att of attachments; track att.id) {
        <li class="attach__item">
          <div class="attach__item-info">
            <svg class="attach__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            </svg>
            <div>
              <span class="attach__name">{{ att.name }}</span>
              <span class="attach__meta">{{ formatSize(att.size) }} · {{ att.createdAt | date:'MMM d, h:mm a' }}</span>
            </div>
          </div>

          <audio class="attach__player" [src]="getUrl(att.id)" controls></audio>

          <div class="attach__actions">
            <button class="attach__action" (click)="download(att)" title="Download">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="attach__action attach__action--danger" (click)="remove(att.id)" title="Remove">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </li>
      }
    </ul>
  } @else {
    <p class="attach__empty">No recordings yet. Upload a file or use the microphone.</p>
  }
</div>
